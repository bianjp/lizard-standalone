name: Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]*"
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      versions: ${{ steps.matrix.outputs.versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Compute build matrix
        id: matrix
        run: python scripts/build_matrix.py

  build:
    needs: prepare
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux: use Python Build Standalone (via uv) instead of actions/setup-python so
      # the bundled libpython only requires glibc 2.17+, not the newer glibc tied to
      # official CPython builds on ubuntu-latest (e.g. 2.38 for Python 3.14).
      - name: Install uv and Python (build-standalone)
        if: runner.os == 'Linux'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Setup Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Create virtual environment (Linux)
        if: runner.os == 'Linux'
        run: uv venv --python 3.14

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: uv pip install "lizard==${{ matrix.lizard_version }}" "pyinstaller>=6.0"

      - name: Install dependencies
        if: runner.os != 'Linux'
        run: pip install "lizard==${{ matrix.lizard_version }}" "pyinstaller>=6.0"

      # --no-project: do not sync pyproject.toml/uv.lock (which pins a single lizard
      # version) over the matrix-selected version installed above.
      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: uv run --no-project python -m PyInstaller --onefile --clean --name lizard --collect-submodules lizard_ext main.py

      - name: Build with PyInstaller
        if: runner.os != 'Linux'
        run: python -m PyInstaller --onefile --clean --name lizard --collect-submodules lizard_ext main.py

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p release
          cp -v "dist/lizard${{ matrix.ext }}" \
                "release/lizard-${{ matrix.lizard_version }}-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.lizard_version }}-${{ matrix.target }}
          path: release/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release
          sha256sum lizard-* > SHA256SUMS.txt

      - name: Generate release body
        env:
          VERSIONS: ${{ needs.prepare.outputs.versions }}
          TAG: ${{ github.ref_name }}
        run: |
          {
            echo "## lizard-standalone build ${TAG}"
            echo ""
            echo "Includes lizard versions:"
            echo "${VERSIONS}" | jq -r '.[] | "- " + .'
          } > release-body.md
          cat release-body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release-body.md
          fail_on_unmatched_files: true
